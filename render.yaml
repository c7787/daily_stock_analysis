services:
  - type: web
    name: stock-analysis
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python main.py --serve-only --host 0.0.0.0 --port $PORT
    envVars:
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: STOCK_LIST
        value: "600519,300750,002594"
      - key: TZ
        value: Asia/Shanghai
