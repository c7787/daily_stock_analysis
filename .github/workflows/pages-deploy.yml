name: 部署到 GitHub Pages

on:
  workflow_run:
    workflows: ["每日股票分析"]
    types:
      - completed

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      
      - name: 下载分析报告
        uses: actions/download-artifact@v6
        with:
          name: analysis-reports-${{ github.event.workflow_run.run_number }}
          path: reports
          github-token: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true
      
      - name: 生成报告首页
        run: |
          mkdir -p public
          echo '<!DOCTYPE html><html lang="zh"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>股票智能分析报告</title>
          <style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#0f172a;color:#e2e8f0;min-height:100vh}
          .container{max-width:900px;margin:0 auto;padding:2rem}
          h1{font-size:1.8rem;margin-bottom:1rem;color:#38bdf8}
          .card{background:#1e293b;border-radius:12px;padding:1.5rem;margin-bottom:1rem;border:1px solid #334155}
          .card h2{font-size:1.1rem;color:#94a3b8;margin-bottom:.5rem}
          .card a{color:#38bdf8;text-decoration:none;font-size:1.2rem}
          .card a:hover{text-decoration:underline}
          .time{color:#64748b;font-size:.85rem}
          .empty{text-align:center;padding:4rem 2rem;color:#64748b}
          footer{text-align:center;padding:2rem;color:#475569;font-size:.85rem}
          </style></head><body><div class="container">
          <h1>📈 股票智能分析报告</h1>
          <p style="color:#64748b;margin-bottom:2rem">每日自动更新 · 由 AI 驱动</p>' > public/index.html
          
          if ls reports/market_review_*.md 1>/dev/null 2>&1; then
            for f in reports/market_review_*.md; do
              date_str=$(basename "$f" | sed 's/market_review_//;s/\.md//')
              echo "<div class='card'><h2>📊 大盘复盘</h2><a href='$f'>$date_str</a></div>" >> public/index.html
            done
            cp reports/*.md public/
          else
            echo "<div class='empty'><p>📭 暂无报告</p><p style='margin-top:1rem'>等待首次分析完成...</p></div>" >> public/index.html
          fi
          
          echo "<footer>由 <a href='https://github.com/ZhuLinsen/daily_stock_analysis' style='color:#38bdf8'>Daily Stock Analysis</a> 驱动 · 仅供参考</footer></div></body></html>" >> public/index.html
      
      - name: 部署到 GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          force_orphan: true
